# Nginx config for Docker-based EC2 deployment.
# Mounts as /etc/nginx/conf.d/default.conf inside the nginx container.
# "api" is the docker-compose service name — Docker DNS resolves it.

server {
    listen 80;
    server_name _;

    root /var/www/inno-pulse;
    index index.html;

    charset utf-8;
    charset_types text/html application/json text/css application/javascript;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API -> uvicorn (container "api" on port 8000)
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Static assets — long cache
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
