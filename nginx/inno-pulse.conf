# Inno-Pulse — Nginx site config for EC2 (Ubuntu 22.04)
# Place at /etc/nginx/sites-available/inno-pulse and symlink into sites-enabled.

server {
    listen 80;
    server_name _;  # replace with your EC2 domain, e.g. innopulse.example.com

    # React build output (frontend/dist copied here)
    root /var/www/inno-pulse;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API -> uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # static assets — long cache
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
